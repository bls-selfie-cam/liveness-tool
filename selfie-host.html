<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLS Selfie Injector</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        .container { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 30px; max-width: 600px; width: 100%; text-align: center; }
        .status { padding: 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        .status.success { background: #0d2818; border-left: 4px solid #3fb950; color: #3fb950; }
        .status.error { background: #2d0a0a; border-left: 4px solid #da3633; color: #da3633; }
        .status.info { background: #0d1a2b; border-left: 4px solid #58a6ff; color: #58a6ff; }
        .loader { display: inline-block; width: 24px; height: 24px; border: 3px solid #30363d; border-top-color: #3fb950; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 12px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #2ea043; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .note { margin-top: 16px; font-size: 12px; color: #8b949e; }
        .select-box { margin: 16px 0; padding: 8px; border-radius: 8px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; width: 100%; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1 style="font-size:20px;margin-bottom:8px;">📸 BLS Selfie Injector</h1>
        <p style="color:#8b949e;font-size:13px;margin-bottom:24px;">Professional Selfie Link Processor</p>

        <div id="status" class="status info">
            <span class="loader"></span> Initializing...
        </div>

        <select id="siteSelect" class="select-box">
            <option value="https://www.blsspainmorocco.net/MAR/Appointment/Liveness?data=">Spain (BLS Spain)</option>
            <option value="https://morocco.blsportugal.com/MAR/Appointment/Liveness?data=">Portugal (BLS Portugal)</option>
        </select>

        <button id="injectBtn" class="btn" style="display:none;">📸 Start Selfie</button>

        <div class="note">⚠️ If popup is blocked, please allow popups for this site.</div>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            const injectBtn = document.getElementById('injectBtn');
            const siteSelect = document.getElementById('siteSelect');
            let selfieData = null;
            let encodedData = null;

            function setStatus(message, type = 'info') {
                statusEl.className = 'status ' + type;
                statusEl.innerHTML = message;
            }

            function decodeBase64(str) {
                try {
                    const cleaned = str.replace(/\s/g, '');
                    const decoded = atob(cleaned);
                    return decodeURIComponent(decoded);
                } catch (e) {
                    console.error('Base64 decode error:', e);
                    return null;
                }
            }

            async function fetchFromUrl(url) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.text();
                } catch (e) {
                    console.error('Fetch error:', e);
                    return null;
                }
            }

            // استخراج data من الرابط
            const urlParams = new URLSearchParams(window.location.search);
            const rawData = urlParams.get('data');

            if (!rawData) {
                setStatus('❌ No data provided in the link.', 'error');
                return;
            }

            encodedData = rawData;
            setStatus('⏳ Loading data...', 'info');

            // التحقق: هل البيانات هي رابط (يبدأ بـ http)؟
            if (rawData.startsWith('http://') || rawData.startsWith('https://')) {
                // الحالة 1: رابط Pastebin
                setStatus('⏳ Fetching data from Pastebin...', 'info');
                fetchFromUrl(rawData).then(text => {
                    if (!text) {
                        setStatus('❌ Failed to fetch data from Pastebin.', 'error');
                        return;
                    }
                    try {
                        selfieData = JSON.parse(text);
                        if (!selfieData.appointmentData || !selfieData.livenessData || !selfieData.token) {
                            throw new Error('Missing required fields');
                        }
                        setStatus('✅ Data loaded from Pastebin successfully!', 'success');
                        injectBtn.style.display = 'inline-block';
                        siteSelect.style.display = 'inline-block';
                    } catch (e) {
                        console.error('Parse error:', e);
                        setStatus('❌ Failed to parse Pastebin data: ' + e.message, 'error');
                    }
                });
            } else {
                // الحالة 2: بيانات مشفرة بـ Base64
                setStatus('⏳ Decoding Base64 data...', 'info');
                const decoded = decodeBase64(rawData);
                if (!decoded) {
                    setStatus('❌ Failed to decode Base64 data.', 'error');
                    return;
                }
                try {
                    selfieData = JSON.parse(decoded);
                    if (!selfieData.appointmentData || !selfieData.livenessData || !selfieData.token) {
                        throw new Error('Missing required fields');
                    }
                    setStatus('✅ Base64 data loaded successfully!', 'success');
                    injectBtn.style.display = 'inline-block';
                    siteSelect.style.display = 'inline-block';
                } catch (e) {
                    console.error('Parse error:', e);
                    setStatus('❌ Failed to parse Base64 data: ' + e.message, 'error');
                }
            }

            injectBtn.onclick = function() {
                this.disabled = true;
                this.textContent = '⏳ Opening BLS...';

                // بناء الرابط مع البيانات (نمررها كما هي، لأن الصفحة المستهدفة تتوقعها مشفرة أو كرابط)
                const baseUrl = siteSelect.value;
                // إذا كانت البيانات رابطاً (تبدأ بـ http)، نمررها كما هي، وإلا نمررها مشفرة
                const dataParam = (rawData.startsWith('http://') || rawData.startsWith('https://')) ? rawData : encodedData;
                const fullUrl = baseUrl + dataParam;

                const popup = window.open(fullUrl, '_blank', 'width=500,height=700');

                if (!popup) {
                    setStatus('❌ Popup blocked! Please allow popups and try again.', 'error');
                    this.disabled = false;
                    this.textContent = '📸 Start Selfie';
                    return;
                }

                setStatus('⏳ Opening BLS page...', 'info');

                setTimeout(() => {
                    setStatus('✅ BLS page opened. Complete the verification in the popup.', 'success');
                    this.disabled = false;
                    this.textContent = '📸 Start Selfie';
                }, 3000);
            };

        })();
    </script>
</body>
</html>
