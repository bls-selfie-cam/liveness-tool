<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Selfie Injector - BLS</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        #status { margin-top: 20px; padding: 10px; background: #222; border-radius: 8px; }
        button { background: #00ff88; color: #000; border: none; padding: 12px 20px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .loader { display: inline-block; width: 20px; height: 20px; border: 2px solid #00ff88; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .note { margin-top: 20px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <h3>🔄 BLS Selfie Injector</h3>
    <div id="status">⏳ Loading data...</div>
    <button id="injectBtn" class="hidden">📸 Start Selfie</button>
    <div id="note" class="note hidden">⚠️ If popup is blocked, please allow popups for this site.</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dataUrl = urlParams.get('data');

        if (!dataUrl) {
            document.getElementById('status').innerHTML = '❌ Error: No data link provided.';
        } else {
            document.getElementById('status').innerHTML = '✅ Data link received. Fetching data...';
            
            fetch(dataUrl)
                .then(res => res.json())
                .then(data => {
                    const record = data.record || data;
                    const appointmentData = record.appointmentData;
                    const livenessData = record.livenessData;
                    const token = record.token;
                    
                    if (!appointmentData || !livenessData || !token) {
                        throw new Error('Missing fields in fetched data');
                    }
                    
                    document.getElementById('status').innerHTML = '✅ Data loaded. Please click Start Selfie.';
                    document.getElementById('injectBtn').classList.remove('hidden');
                    document.getElementById('note').classList.remove('hidden');
                    window.selfieData = { appointmentData, livenessData, token };
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('status').innerHTML = '❌ Failed to fetch data: ' + err.message;
                });
        }
        
        document.getElementById('injectBtn').onclick = () => {
            document.getElementById('status').innerHTML = '<span class="loader"></span> Opening BLS window...';
            document.getElementById('injectBtn').disabled = true;
            
            const popup = window.open('https://www.blsspainmorocco.net/MAR/appointment/livenessrequest', '_blank', 'width=500,height=700');
            
            if (!popup) {
                document.getElementById('status').innerHTML = '❌ Popup blocked! Please allow popups and try again.';
                document.getElementById('injectBtn').disabled = false;
                return;
            }
            
            let attempts = 0;
            const maxAttempts = 40;
            
            const interval = setInterval(() => {
                attempts++;
                try {
                    const doc = popup.document;
                    const appInput = doc.querySelector('input[name="AppointmentData"]');
                    const livInput = doc.querySelector('input[name="LivenessData"]');
                    const tokenInput = doc.querySelector('input[name="__RequestVerificationToken"]');
                    const acceptBtn = doc.querySelector('.btn-success');
                    
                    if (appInput && livInput && tokenInput) {
                        appInput.value = window.selfieData.appointmentData;
                        livInput.value = window.selfieData.livenessData;
                        tokenInput.value = window.selfieData.token;
                        document.getElementById('status').innerHTML = '✅ Data injected!';
                        
                        if (acceptBtn) {
                            acceptBtn.click();
                            document.getElementById('status').innerHTML = '✅ Selfie started! Complete the verification in the popup.';
                        }
                        clearInterval(interval);
                    } else if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        document.getElementById('status').innerHTML = '⚠️ Could not inject automatically. Please press Accept manually in the popup.';
                    }
                } catch(e) {
                    if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        document.getElementById('status').innerHTML = '⚠️ Please press Accept manually in the popup.';
                    }
                }
            }, 500);
        };
    </script>
</body>
</html>
